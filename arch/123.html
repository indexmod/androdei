<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Жё рэвьян тэ шэршэ</title>
<style>
:root{
  --red:#d92b1f;
  --bg:#f5f5f2;
  --b:1.5px solid var(--red);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  font-family:'Arial Narrow','Helvetica Neue Condensed',Impact,sans-serif;
  color:var(--red);
}

.page{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:80px 40px;
}

/* === ОБЩАЯ СЕТКА === */
.grid{
  width:100%;
  max-width:1200px;
  display:grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows:auto 1fr;
}

.cell{
  border:var(--b);
  padding:40px;
}

/* === ПЛАКАТ === */
.poster{
  grid-row:1 / span 2;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.poster-inner{
  font-size:clamp(72px,11vw,180px);
  line-height:0.95;
  font-weight:900;
  letter-spacing:0.05em;
  text-transform:uppercase;
}

.poster-inner span{display:block}

/* === ПРАВАЯ ВЕРХНЯЯ: ЛОНГСЛИВ + ЦЕНА === */
.product{
  display:flex;
  flex-direction:column;
  gap:24px;
}

.price{
  align-self:flex-end;
  border:var(--b);
  padding:10px 14px;
  font-weight:900;
  font-size:22px;
}

.long{
  width:100%;
}

.long text{
  font-weight:900;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

/* === ПРАВАЯ НИЖНЯЯ === */
.actions{
  display:flex;
  flex-direction:column;
  gap:24px;
}

.order{
  border:var(--b);
  background:transparent;
  color:var(--red);
  border-radius:999px;
  padding:16px 24px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}
.order:hover{background:var(--red);color:#fff}

.market label{
  display:flex;
  gap:10px;
  margin-bottom:8px;
  cursor:pointer;
  font-size:14px;
}

/* === АДАПТИВ === */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
    grid-template-rows:auto auto auto;
  }
  .poster{grid-row:auto}
}
</style>
</head>
<body>

<div class="page">
  <div class="grid">

    <!-- ПЛАКАТ -->
    <div class="cell poster">
      <div class="poster-inner">
        <span>ЖЁ</span>
        <span>РЭВЬЯН</span>
        <span>ТЭ</span>
        <span>ШЭРШЭ</span>
      </div>
    </div>

    <!-- ЛОНГСЛИВ + ЦЕНА -->
    <div class="cell product">
      <div class="price">50 €</div>
      <svg class="long" viewBox="0 0 240 280" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- контур лонгслива -->
        <path d="M60 20 H100 L120 40 L140 20 H180 L220 70 L200 90 V260 H40 V90 L20 70 Z" stroke="currentColor" stroke-width="2"/>
        <!-- макет как у плаката -->
        <g text-anchor="middle" fill="currentColor">
          <text x="120" y="110">ЖЁ</text>
          <text x="120" y="140">РЭВЬЯН</text>
          <text x="120" y="170">ТЭ</text>
          <text x="120" y="200">ШЭРШЭ</text>
        </g>
      </svg>
    </div>

    <!-- ДЕЙСТВИЯ -->
    <div class="cell actions">
      <button class="order" onclick="openSelected()">Заказать</button>
      <div class="market">
        <label><input type="radio" name="mp" value="https://printbar.ru/design-land/" checked> Printbar</label>
        <label><input type="radio" name="mp" value="https://lastprint.ru/"> lastprint</label>
        <label><input type="radio" name="mp" value="https://www.vsemayki.ru/sell"> Vsemayki</label>
        <label><input type="radio" name="mp" value="http://printdirect.ru/info/platform"> Printdirect</label>
        <label><input type="radio" name="mp" value="https://teespring.com/"> Teespring</label>
        <label><input type="radio" name="mp" value="https://www.spreadshirt.com/start-selling-shirts"> Spreadshirt</label>
        <label><input type="radio" name="mp" value="https://www.redbubble.com/about/selling"> RedBubble</label>
        <label><input type="radio" name="mp" value="https://www.threadless.com/"> Threadless</label>
      </div>
    </div>

  </div>
</div>

<script>
function openSelected(){
  const r=document.querySelector('input[name="mp"]:checked');
  if(r) window.open(r.value,'_blank');
}
</script>

</body>
</html>
