<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Face Hyperstimulus Index</title>
<style>
  body {
    margin: 0;
    background: #fff;
    font-family: Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin: 20px 0 5px;
    font-size: 20px;
    font-weight: 600;
  }

  .subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 10px;
  }

  svg {
    border: 1px solid #ddd;
  }

  .face circle {
    transition: r 0.4s ease;
  }

  .cell:hover .face {
    transform: scale(1.05);
  }

  .controls {
    margin: 15px;
    font-size: 14px;
  }
</style>
</head>

<body>

<h1>Индекс гиперстимула человеческого лица</h1>
<div class="subtitle">Параметрическое исследование минимальной конфигурации лица</div>

<div class="controls">
  Глобальный коэффициент гиперстимула:
  <input id="stimulus" type="range" min="0" max="1" step="0.01" value="0">
</div>

<svg id="svg" width="720" height="480"></svg>

<script>
const rows = 4;
const cols = 6;

const cellW = 120;
const cellH = 120;

const faceR = 40;
const eyeBase = 3;
const mouthBase = 6;

const eyeMax = 12;
const mouthMax = 28;

const svg = document.getElementById("svg");
const slider = document.getElementById("stimulus");

function createFace(row, col) {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "cell");
  g.setAttribute(
    "transform",
    `translate(${col * cellW + cellW / 2}, ${row * cellH + cellH / 2})`
  );

  const face = document.createElementNS(svg.namespaceURI, "g");
  face.setAttribute("class", "face");

  const faceCircle = document.createElementNS(svg.namespaceURI, "circle");
  faceCircle.setAttribute("r", faceR);
  faceCircle.setAttribute("fill", "white");
  faceCircle.setAttribute("stroke", "black");

  const eyeL = document.createElementNS(svg.namespaceURI, "circle");
  const eyeR = document.createElementNS(svg.namespaceURI, "circle");
  eyeL.setAttribute("cx", -12);
  eyeR.setAttribute("cx", 12);
  eyeL.setAttribute("cy", -10);
  eyeR.setAttribute("cy", -10);
  eyeL.setAttribute("fill", "black");
  eyeR.setAttribute("fill", "black");

  const mouth = document.createElementNS(svg.namespaceURI, "circle");
  mouth.setAttribute("cy", 14);
  mouth.setAttribute("fill", "red");

  face.append(faceCircle, eyeL, eyeR, mouth);
  g.appendChild(face);
  svg.appendChild(g);

  return { eyeL, eyeR, mouth, row, col };
}

const faces = [];

for (let r = 0; r < rows; r++) {
  for (let c = 0; c < cols; c++) {
    faces.push(createFace(r, c));
  }
}

function updateFaces(k) {
  faces.forEach(f => {
    const eyeFactor = f.col / (cols - 1);
    const mouthFactor = f.row / (rows - 1);

    const eyeR = eyeBase + eyeFactor * eyeMax * (1 + k);
    const mouthR = mouthBase + mouthFactor * mouthMax * (1 + k * 1.2);

    f.eyeL.setAttribute("r", eyeR);
    f.eyeR.setAttribute("r", eyeR);
    f.mouth.setAttribute("r", mouthR);
  });
}

slider.addEventListener("input", e => {
  updateFaces(parseFloat(e.target.value));
});

updateFaces(0);
</script>

</body>
</html>
